<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>CraveAI - Find Your Perfect Meal</title>
<!-- Google Fonts: Outfit -->

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->

                "surface-tint": "#ffb4a5",
                "tertiary-fixed-dim": "#00dbe7",
                "on-surface": "#e5e2e3",
                "primary-fixed": "#ffdad3",
                "on-surface-variant": "#e5bdb6",

                "primary-fixed-dim": "#ffb4a5",

                "on-primary": "#650b00",

                "outline": "#ac8881",

                    '0%, 100%': { transform: 'translateY(0)' },

<style>
        /* Custom Input Styles */
        .glass-input {
            background-color: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus-within {
            border-color: #ff5637; /* primary-container */
            box-shadow: 0 0 15px rgba(255, 86, 55, 0.2);
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #2a2a2b; /* surface-container-high */
            border-radius: 2px;
            border: none;
        }

        /* JavaScript handles filling the track gradient */
        
        input[type=range]::-webkit-slider-thumb {
            border: 2px solid rgba(255, 255, 255, 0.8);
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: linear-gradient(to right, #ff5637, #6a1c9b);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(255, 86, 55, 0.5);
            transition: transform 0.1s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Hide scrollbar for text area */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base overflow-x-hidden">
<!-- TopAppBar (From JSON - Rendered as anchor) -->
<header class="fixed top-0 w-full z-50 bg-background/80 dark:bg-background/80 backdrop-blur-xl border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.1)] flex items-center justify-between px-gutter h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
</div>
<div class="absolute left-1/2 transform -translate-x-1/2">
<h1 class="font-display-lg-mobile text-display-lg-mobile bg-clip-text text-transparent bg-gradient-to-r from-primary-container to-secondary-container">
                CraveAI
            </h1>
</div>
<div class="flex items-center">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-white/10">
<!-- Dummy avatar -->
<span class="material-symbols-outlined text-[32px] text-on-surface-variant/50 mt-1">person</span>
</div>
</button>
</div>
</header>
<!-- Main Content: Split Layout -->
<main class="flex-grow mt-16 flex flex-col md:flex-row w-full h-full min-h-[calc(100vh-4rem)]">
<!-- Left Column: Hero Image -->
<div class="relative w-full md:w-1/2 h-[30vh] md:h-auto overflow-hidden border-b md:border-b-0 md:border-r border-white/5">
<img alt="High resolution, cinematic food photography of an exquisite fine dining dish. The dish features perfectly seared wagyu beef resting on a bed of vibrant, jewel-toned vegetable puree, garnished with delicate micro-herbs and a shimmering jus. The lighting is dramatic and moody, emphasizing the textures and rich colors against a dark, elegant background, perfectly capturing a premium, futuristic culinary aesthetic." class="absolute inset-0 w-full h-full object-cover" data-alt="High resolution, cinematic food photography of an exquisite fine dining dish. The dish features perfectly seared wagyu beef resting on a bed of vibrant, jewel-toned vegetable puree, garnished with delicate micro-herbs and a shimmering jus. The lighting is dramatic and moody, emphasizing the textures and rich colors against a dark, elegant background, perfectly capturing a premium, futuristic culinary aesthetic." src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg"/>
<!-- Gradient Overlay for smooth blending -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent md:bg-gradient-to-r"></div>
<!-- Hero Typography (Visible mainly on desktop or overlaid on mobile) -->
<div class="absolute bottom-8 left-8 right-8 z-10 md:bottom-auto md:top-1/2 md:-translate-y-1/2">
<h2 class="font-display-lg text-display-lg-mobile md:text-display-lg text-white mb-4 animate-float" style="text-shadow: 0 4px 20px rgba(0,0,0,0.8);">
                    Curate Your Cravings.
                </h2>
<p class="font-title-lg text-title-lg text-on-surface-variant max-w-md hidden md:block">
                    Let our intelligence craft a dining experience tailored perfectly to your tastes, location, and vibe.
                </p>
</div>
</div>
<!-- Right Column: Form -->
<div class="w-full md:w-1/2 flex items-center justify-center p-container-margin md:p-section-gap relative">
<!-- Ambient Glow behind form -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-primary-container/10 blur-[100px] rounded-full pointer-events-none z-0"></div>
<!-- Glassmorphic Form Card -->
<div class="w-full max-w-md bg-white/[0.03] backdrop-blur-2xl border border-white/10 rounded-2xl p-6 md:p-8 shadow-2xl relative z-10">
<div class="mb-8 text-center md:text-left">
<h3 class="font-headline-md text-headline-md text-white mb-1">Set Preferences</h3>
<p class="font-body-base text-body-base text-on-surface-variant">Tell CraveAI what you're in the mood for.</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Location Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Location</label>
<div class="glass-input flex items-center rounded-xl px-4 py-3 relative overflow-hidden group">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary-container mr-3 transition-colors" style="font-variation-settings: 'FILL' 0;">location_on</span>
<input class="bg-transparent border-none outline-none text-white w-full font-body-base p-0 placeholder-on-surface-variant/50 focus:ring-0" placeholder="Current Location" type="text"/>
</div>
</div>
<!-- Budget Segmented Control -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Budget Tier</label>
<div class="flex bg-[#000000] border border-white/10 rounded-full p-1 relative" id="budget-control">
<!-- Sliding Indicator (JS handled) -->
<div class="absolute top-1 bottom-1 w-1/3 bg-white/10 border border-white/10 rounded-full transition-all duration-300 ease-out z-0 left-1" id="budget-indicator"></div>
<button class="budget-btn flex-1 text-center py-2 rounded-full font-label-sm text-label-sm cursor-pointer transition-all z-10 text-primary-container font-bold" data-index="0" onclick="selectBudget(0)" type="button">
                                Low
                            </button>
<button class="budget-btn flex-1 text-center py-2 rounded-full font-label-sm text-label-sm cursor-pointer transition-all z-10 text-on-surface-variant" data-index="1" onclick="selectBudget(1)" type="button">
                                Medium
                            </button>
<button class="budget-btn flex-1 text-center py-2 rounded-full font-label-sm text-label-sm cursor-pointer transition-all z-10 text-on-surface-variant" data-index="2" onclick="selectBudget(2)" type="button">
                                High
                            </button>
</div>
</div>
<!-- Cuisine Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Cuisine Focus</label>
<div class="glass-input flex items-center rounded-xl px-4 py-3 group">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary-container mr-3 transition-colors" style="font-variation-settings: 'FILL' 0;">restaurant</span>
<input class="bg-transparent border-none outline-none text-white w-full font-body-base p-0 placeholder-on-surface-variant/50 focus:ring-0" placeholder="e.g., Omakase, Modern Italian" type="text"/>
</div>
</div>
<!-- Min Rating Slider -->
<div class="space-y-2 pt-2">
<div class="flex justify-between items-end mb-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Minimum Rating</label>
<span class="font-title-lg text-title-lg text-primary-container" id="rating-display">4.0+</span>
</div>
<div class="relative w-full h-8 flex items-center">
<!-- Custom Track Fill via JS -->
<div class="absolute left-0 h-1 bg-gradient-to-r from-primary-container to-secondary-container rounded-l-full pointer-events-none z-0" id="slider-fill" style="width: 80%;"></div>
<input class="w-full relative z-10" id="rating-slider" max="5" min="0" oninput="updateSlider()" step="0.1" type="range" value="4.0"/>
</div>
</div>
<!-- Additional Preferences -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Additional Vibes</label>
<div class="glass-input rounded-xl p-4 group">
<textarea class="bg-transparent border-none outline-none text-white w-full font-body-base p-0 placeholder-on-surface-variant/50 focus:ring-0 resize-none" placeholder="Quiet ambiance, outdoor seating, wine pairing options..." rows="3"></textarea>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full relative group overflow-hidden rounded-xl" type="submit">
<!-- Background Gradient -->
<div class="absolute inset-0 bg-gradient-to-r from-primary-container to-secondary-container transition-transform duration-500 group-hover:scale-105"></div>
<!-- Inner Glow -->
<div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-white/10 blur-md"></div>
<!-- Content -->
<div class="relative flex items-center justify-center py-4 px-6 gap-2">
<span class="font-headline-md text-[18px] text-white font-bold tracking-wide">Find My Perfect Meal</span>
<span class="material-symbols-outlined text-white animate-pulse-slow" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</button>
</div>
</form>
</div>
</div>
</main>
<script>
        // Budget Segmented Control Logic
        function selectBudget(index) {
            const buttons = document.querySelectorAll('.budget-btn');
            const indicator = document.getElementById('budget-indicator');
            
            // Move indicator
            const positions = ['left-1', 'left-[33%]', 'left-[66%]'];
            indicator.className = `absolute top-1 bottom-1 w-[32%] bg-white/10 border border-white/10 rounded-full transition-all duration-300 ease-out z-0 ${positions[index]}`;
            
            // Update button styles
            buttons.forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('text-primary-container', 'font-bold');
                    btn.classList.remove('text-on-surface-variant');
                } else {
                    btn.classList.remove('text-primary-container', 'font-bold');
                    btn.classList.add('text-on-surface-variant');
                }
            });
        }

        // Custom Slider Logic
        function updateSlider() {
            const slider = document.getElementById('rating-slider');
            const display = document.getElementById('rating-display');
            const fill = document.getElementById('slider-fill');
            
            const value = parseFloat(slider.value).toFixed(1);
            display.textContent = value + '+';
            
            // Calculate percentage for fill
            const percentage = (value / 5) * 100;
            fill.style.width = percentage + '%';
        }

        // Initialize slider fill
        updateSlider();
    </script>
</body></html>
